name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run tsc --noEmit

      - name: Run tests
        run: bun run test

      - name: Lint
        run: bun run lint

      - name: Build Flue worker
        run: bun run build

      - name: Check Worker types
        run: bunx wrangler types --check

      - name: Validate generated Worker config
        run: bunx wrangler deploy --dry-run --config dist/ask_bonk/wrangler.json --var BONK_VERSION:ci --var BONK_COMMIT:${GITHUB_SHA}
